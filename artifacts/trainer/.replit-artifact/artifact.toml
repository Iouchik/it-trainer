kind = "web"
previewPath = "/"
title = "IT-Тренажёр"
version = "1.0.0"
id = "artifacts/trainer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20973

[services.development]
run = "pnpm --filter @workspace/trainer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trainer", "run", "build" ]
publicDir = "artifacts/trainer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20973"
BASE_PATH = "/"
